<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia Pintar</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* HEADER */
.top {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background: rgba(0,0,0,0.3);
}

h1 {
    margin:0;
    font-size:1.5rem;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.btn {
    padding:25px 15px;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.2s;
    display:flex;
    align-items:center;
    justify-content:center;
}

.btn:hover {
    transform:scale(1.05);
}

/* COLORES */
.c1{background:#3b82f6;}
.c2{background:#22c55e;}
.c3{background:#f59e0b;}
.c4{background:#ef4444;}
.c5{background:#06b6d4;}
.c6{background:#9333ea;}
.c7{background:#14b8a6;}
.c8{background:#f43f5e;}
.c9{background:#0ea5e9;}
.c10{background:#64748b;}
</style>
</head>

<body>

<div class="top">
    <h1>💊 Farmacia Pintar</h1>
    <span id="clock"></span>
</div>

<div class="grid">

<a class="btn c3" href="https://docs.google.com/forms/d/e/1FAIpQLSdUhc3wLRfU9C6QzU5G2EuIo4CeXpHN_tO_REw4JvWJ__hsvA/viewform" target="_blank">RECEPCION COFASA</a>

<a class="btn c5" href="https://www.youtube.com/" target="_blank">YOUTUBE</a>

<a class="btn c1" href="https://www.mercadopago.com.ar/collections" target="_blank">MERCADO PAGO</a>

<a class="btn c2" href="https://script.google.com/macros/s/AKfycbyxGnlfR0oAN1RCN5DBUOG2oDbTrhtm8YhTqqAG0EHorbWC3zY7_l6mB8F1mFDS_vH0Uw/exec">GENÉRICOS</a>

<a class="btn c2" href="https://www.colfarmaonline.org.ar" target="_blank">COLEGIO</a>

<a class="btn c4" href="http://pedido2.cofasa.com.ar/Account/LogOn?ReturnUrl=%2f" target="_blank">PLATAFORMA</a>

<a class="btn c7" href="https://www.misvalidaciones.com.ar/" target="_blank">IOSFA RECETAS</a>

<a class="btn c7" href="https://validador.iosfa.gob.ar/ValidadorSUA1" target="_blank">IOSFA AFILIADO</a>

<a class="btn c9" href="https://silfab.turnosdefarmacias.info" target="_blank">SILFAB</a>

<a class="btn c8" href="http://sistemasl.ioma.gba.gov.ar/sistemas/meppes_farmacias/index.php" target="_blank">MEPPES</a>

<a class="btn c1" href="https://turnos.farmaciapintar.uk" target="_blank">TURNOS</a>

<a class="btn c10" href="https://app.drogueriafarmasun.com.ar/login" target="_blank">FARMASUN</a>

<a class="btn c4" href="https://mail.google.com/mail/u/1/" target="_blank">MAIL</a>

<a class="btn c6" href="https://extranet.osde.com.ar/" target="_blank">OSDE</a>

</div>

<script>
setInterval(()=>{
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
