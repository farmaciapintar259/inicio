<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmacia Pintar</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

/* LOGIN */
#login {
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
}

.box {
    background: rgba(255,255,255,0.05);
    padding:30px;
    border-radius:15px;
    backdrop-filter: blur(10px);
    text-align:center;
    width:280px;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* APP */
#app { display:none; }

.top {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background: rgba(0,0,0,0.3);
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:12px;
    padding:20px;
}

.btn {
    padding:20px;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.2s;
}

.btn:hover {
    transform:scale(1.05);
}

/* COLORES */
.c1{background:#3b82f6;}
.c2{background:#22c55e;}
.c3{background:#f59e0b;}
.c4{background:#ef4444;}
.c5{background:#06b6d4;}
.c6{background:#9333ea;}
.c7{background:#14b8a6;}
.c8{background:#f43f5e;}
.c9{background:#0ea5e9;}
.c10{background:#64748b;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>💊 Farmacia Pintar</h2>

    <form onsubmit="login(event)">
        <input id="user" name="username" autocomplete="username" placeholder="Usuario" required>
        <input id="pass" name="password" type="password" autocomplete="current-password" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
    </form>

    <p id="error"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="top">
  <span>👤 Empleado</span>
  <div>
    <button onclick="logout()">Salir</button>
    <span id="clock"></span>
  </div>
</div>

<div class="grid">

<a class="btn c3" href="https://docs.google.com/forms/d/e/1FAIpQLSdUhc3wLRfU9C6QzU5G2EuIo4CeXpHN_tO_REw4JvWJ__hsvA/viewform" target="_blank">RECEPCION COFASA</a>

<a class="btn c5" href="https://www.youtube.com/" target="_blank">YOUTUBE</a>

<a class="btn c1" href="https://www.mercadopago.com.ar/collections" target="_blank">MERCADO PAGO</a>

<a class="btn c2" href="https://script.google.com/macros/s/AKfycbz9FnNtkNbRNrqtIcoo-9aho_j6LBBeYVfP4ntA7OVbGxwwmblfqdPd6WjIAHltwDHOQw/exec" target="_blank">GENÉRICOS</a>

<a class="btn c2" href="https://www.colfarmaonline.org.ar" target="_blank">COLEGIO</a>

<a class="btn c2" href="https://farma.pami.org.ar/solicitud" target="_blank">PAMI</a>

<a class="btn c4" href="http://pedido2.cofasa.com.ar/Account/LogOn?ReturnUrl=%2f" target="_blank">PLATAFORMA</a>

<a class="btn c7" href="https://www.misvalidaciones.com.ar/" target="_blank">IOSFA RECETAS</a>

<a class="btn c7" href="https://validador.iosfa.gob.ar/ValidadorSUA1" target="_blank">IOSFA AFILIADO</a>

<a class="btn c9" href="https://panales.turnosdefarmacias.info/" target="_blank">PAÑALERA</a>

<a class="btn c9" href="https://silfab.turnosdefarmacias.info" target="_blank">SILFAB</a>

<a class="btn c8" href="http://sistemasl.ioma.gba.gov.ar/sistemas/meppes_farmacias/index.php" target="_blank">MEPPES</a>

<a class="btn c1" href="https://www.turnosdefarmacias.info/" target="_blank">TURNOS</a>

<a class="btn c10" href="https://app.drogueriafarmasun.com.ar/login" target="_blank">FARMASUN</a>

<a class="btn c4" href="https://mail.google.com/mail/u/1/" target="_blank">MAIL</a>

<a class="btn c6" href="https://extranet.osde.com.ar/" target="_blank">OSDE</a>

</div>

</div>

<script>
const USER = "259";
const PASS = "Farmaco00";

let timeout;

window.onload = () => {
    if(localStorage.getItem("login") === "ok"){
        mostrarApp();
    }
}

function login(e){
    e.preventDefault();

    if(user.value === USER && pass.value === PASS){
        localStorage.setItem("login","ok");
        mostrarApp();
    } else {
        error.innerText = "Datos incorrectos";
    }
}

function mostrarApp(){
    login.style.display="none";
    app.style.display="block";
    startTimer();
}

function logout(){
    localStorage.removeItem("login");
    location.reload();
}

function resetTimer(){
    clearTimeout(timeout);
    timeout = setTimeout(()=>{
        alert("Sesión cerrada por inactividad");
        logout();
    }, 600000);
}

function startTimer(){
    ["click","mousemove","keypress"].forEach(e=>{
        document.addEventListener(e,resetTimer);
    });
    resetTimer();
}

setInterval(()=>{
    clock.innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
